[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
  "mkdir -p staticfiles",
  "python manage.py collectstatic --noinput --clear",
  "python manage.py migrate --noinput",
  "python manage.py setup_owner",
  "python manage.py cleanup_test_data"
]

[start]
cmd = "gunicorn bookings_saas.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
